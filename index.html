<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinEmpire</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<div class="app">

    <!-- Верхняя панель -->
    <header>

        <div class="profile">

            <img src="assets/avatar.png" class="avatar">

            <div>
                <h2 id="username">Player</h2>
                <p>CoinEmpire</p>
            </div>

        </div>

    </header>

    <!-- Баланс -->

    <section class="balance">

        <h1 id="coins">0</h1>
        <span>Coins</span>

    </section>

    <!-- Энергия -->

    <section class="energy">

        <div class="energy-bar">

            <div class="energy-fill" id="energyFill"></div>

        </div>

        <p>
            ⚡
            <span id="energy">1000</span>
            /
            <span id="maxEnergy">1000</span>
        </p>

    </section>

    <!-- Монета -->

    <section class="coin-section">

        <img
            src="assets/coin.png"
            id="coin"
            class="coin"
            draggable="false"
        >

    </section>

    <!-- Доход -->

    <section class="stats">

        <div class="card">
            <span>Доход / час</span>
            <h3 id="income">0</h3>
        </div>

        <div class="card">
            <span>Уровень</span>
            <h3 id="level">1</h3>
        </div>

    </section>

    <!-- Нижнее меню -->

    <nav>

        <button id="homeBtn">
            🏠
            <span>Главная</span>
        </button>

        <button id="upgradeBtn">
            🚀
            <span>Улучшения</span>
        </button>

        <button id="tasksBtn">
            📋
            <span>Задания</span>
        </button>

        <button id="friendsBtn">
            👥
            <span>Друзья</span>
        </button>

        <button id="walletBtn">
            💎
            <span>Кошелёк</span>
        </button>

    </nav>

</div>

<script src="script.js"></script>

</body>
</html>
