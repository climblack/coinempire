<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoinEmpire</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

.container{
    padding:25px;
}

h1{
    font-size:42px;
}

.card{
    background:#1d1d1d;
    border-radius:20px;
    padding:20px;
    margin:15px auto;
    width:90%;
    max-width:400px;
}

.value{
    font-size:34px;
    font-weight:bold;
    margin-top:10px;
}

.energy{
    color:#00ff88;
}

button{
    width:240px;
    height:70px;
    border:none;
    border-radius:20px;
    background:#00c853;
    color:white;
    font-size:28px;
    margin-top:30px;
}

button:active{
    transform:scale(.96);
}
</style>

</head>
<body>

<div class="container">

<h1>🪙 CoinEmpire</h1>

<div class="card">
<h2>Баланс</h2>
<div class="value" id="coins">0</div>
</div>

<div class="card">
<h2>⚡ Энергия</h2>
<div class="value energy" id="energy">100/100</div>
</div>

<button onclick="mine()">⛏ МАЙНИТЬ</button>

<p>+1 монета за клик</p>

</div>

<script>

Telegram.WebApp.ready();

let coins=Number(localStorage.getItem("coins"))||0;
let energy=Number(localStorage.getItem("energy"))||100;

function save(){
localStorage.setItem("coins",coins);
localStorage.setItem("energy",energy);
}

function draw(){
document.getElementById("coins").innerHTML=coins;
document.getElementById("energy").innerHTML=energy+"/100";
}

function mine(){

if(energy<=0)return;

coins++;
energy--;

save();
draw();

}

setInterval(()=>{

if(energy<100){
energy++;
save();
draw();
}

},1000);

draw();

</script>

</body>
</html>
